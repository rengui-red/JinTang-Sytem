user  root; # OpenResty 在 Docker 中通常用 root 以避免权限问题，或者用 nginx
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  10240;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'WAF_STATUS: $waf_action';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # ==============================
    # 变量定义 (用于 WAF 记录)
    # ==============================
    set $waf_action "PASS";

    # ==============================
    # 爬虫指纹识别
    # ==============================
    map $http_user_agent $is_bad_bot {
        default 0;
        "" 1; "-" 1;
        ~*python 1; ~*java/ 1; ~*go-http-client 1;
        ~*curl/ 1; ~*wget/ 1; ~*scrapy 1;
        ~*spider 1; ~*bot 1; ~*crawler 1;
    }

    map $http_user_agent $is_good_bot {
        default 0;
        ~*googlebot 1; ~*bingbot 1; ~*baiduspider 1;
        ~*applebot 1;
    }

    # ==============================
    # 限流区域
    # ==============================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=${RATE_LIMIT:-10r/s};
    limit_req_zone $binary_remote_addr zone=good_bot_limit:10m rate=5r/s;

    server {
        listen 80;
        server_name ${SERVER_NAME:-_};

        # --- 1. 拦截坏爬虫 (Nginx 层快速拦截) ---
        if ($is_bad_bot = 1 && $is_good_bot = 0) {
            set $waf_action "BLOCKED_BAD_BOT";
            return 403;
        }

        location / {
            # --- 2. 基础限流 ---
            limit_req zone=api_limit burst=20 nodelay;
            
            # --- 3. 好爬虫限流 ---
            if ($is_good_bot = 1) {
                limit_req zone=good_bot_limit burst=10 nodelay;
            }

            # --- 4. 蜜罐陷阱 ---
            # 如果请求了隐藏文件，直接记录并拦截
            location ~* /assets/hidden-trap\.css {
                access_log /var/log/nginx/honeypot.log;
                return 404;
            }

            # ==============================
            # 【核心】调用 Lua 脚本进行 SQL 注入防御
            # ==============================
            # 这一步会深度检查 URL 参数，拦截 SQL 注入
            access_by_lua_file /etc/nginx/lua/waf.lua;

            # --- 5. 反向代理 ---
            proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # 健康检查接口
        location /health {
            return 200 "Jin-Tang is Running";
        }
    }
}