<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JINTANG // 金汤 - 官方标志</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        
        .logo-container {
            text-align: center;
            padding: 3rem;
            background: #000;
            border: 2px solid #f1c40f;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
        }
        
        .logo-text {
            font-size: 4rem;
            font-weight: bold;
            color: #f1c40f;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
            margin: 0;
        }
        
        .logo-subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-top: 1rem;
            letter-spacing: 2px;
        }
        
        @media (max-width: 600px) {
            .logo-text { font-size: 2.5rem; }
            .logo-subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <h1 class="logo-text">JINTANG // 金汤</h1>
        <p class="logo-subtitle">固若金汤 · 坚不可摧 · 与众不同  · 保你安全</p>
    </div>
</body>
</html>
